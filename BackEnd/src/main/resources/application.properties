server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/drug_prevention?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

app:
  jwt:
    secret: your_jwt_secret_key_should_be_long_and_secure
    expiration-ms: 86400000 # 24 giờ

logging:
  level:
    org.springframework: INFO
    com.drugprevention: DEBUGspring.application.name=BackEnd
